<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background-image: url("space-background.jpg");
  background-repeat: no-repeat; /* Prevents the image from tiling */
  background-size: cover;       /* Ensures the image covers the entire viewport */
    margin: 0;
    padding: 0;
    background-color: black; /* Sets the background to black */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .my-video {
    /* Makes the video larger */
    width: 100%;
    max-width: 1200px; /* Limits max size on large screens */
    height: auto; /* Maintains aspect ratio */
    display: block;
  }
</style>
</head>

<video class="my-video" autoplay loop playsinline controls>
